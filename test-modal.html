<!DOCTYPE html>
<html>
<head>
  <title>Test Modal Close</title>
  <style>
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .modal-overlay.hidden {
      display: none;
      opacity: 0;
      pointer-events: none;
    }
    
    .modal {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
    }
    
    button {
      padding: 12px 24px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    
    .google-btn {
      background: #4285f4;
      color: white;
    }
    
    .close-btn {
      background: #dc2626;
      color: white;
    }
  </style>
</head>
<body>
  <h1 style="text-align: center; margin-top: 50px;">Modal Close Test</h1>
  <div style="text-align: center;">
    <button onclick="openModal()" style="padding: 15px 30px; font-size: 18px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer;">
      Open Login Modal
    </button>
  </div>

  <div id="auth-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2>Welcome to Pomo</h2>
      <p>Log in or sign up to continue</p>
      <button class="google-btn" onclick="loginWithGoogle()">Continue with Google</button>
      <br>
      <button class="github-btn" onclick="loginWithGitHub()" style="margin-top: 10px; background: #333; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 100%; font-weight: 500;">
        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg" style="margin-right: 10px;">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" fill="white"/>
        </svg>
        Continue with GitHub
      </button>
      <br>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 10000;"></div>

  <script>
    function openModal() {
      const overlay = document.getElementById('auth-overlay');
      overlay.classList.remove('hidden');
      console.log('Modal opened, classes:', overlay.className);
    }

    function closeModal() {
      const overlay = document.getElementById('auth-overlay');
      overlay.classList.add('hidden');
      console.log('Modal closed, classes:', overlay.className);
    }

    function loginWithGoogle() {
      console.log('Google login clicked');
      showToast('Successfully logged in via Google', 'success');
      setTimeout(() => {
        closeModal();
      }, 1200);
    }

    function loginWithGitHub() {
      console.log('GitHub login clicked');
      showToast('Successfully logged in via GitHub', 'success');
      setTimeout(() => {
        closeModal();
      }, 1200);
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.style.cssText = `
        background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 10px;
        min-width: 300px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        display: flex;
        align-items: center;
        gap: 12px;
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
      `;

      const icon = type === 'success' ? '✅' : '❌';
      toast.innerHTML = `
        <span style="font-size: 20px;">${icon}</span>
        <span style="flex: 1; color: #4ade80;">${message}</span>
        <button onclick="this.parentElement.remove()" style="
          background: none;
          border: none;
          color: rgba(255,255,255,0.6);
          cursor: pointer;
          font-size: 18px;
        ">✕</button>
      `;

      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }
  </script>
</body>
</html>
