<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FocusForge{% endblock %}</title>
    <meta name="description" content="{% block meta_desc %}FocusForge — Your ultimate productivity timer with study rooms, analytics, and more.{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <span class="brand-icon">⚡</span>
            <span class="brand-text">FocusForge</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Solo Timer</a>
            <a href="/room" class="nav-link {% if '/room' in request.path %}active{% endif %}">Study Rooms</a>
        </div>
        <div class="nav-actions">
            <button id="themeToggle" class="btn-icon" title="Toggle theme" aria-label="Toggle theme">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        // Theme management
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const themeIcon = document.querySelector('.theme-icon');
        
        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            themeIcon.textContent = theme === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('ff_theme', theme);
        }
        
        const savedTheme = localStorage.getItem('ff_theme') || 'dark';
        applyTheme(savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
